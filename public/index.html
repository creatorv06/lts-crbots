<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify to Continue</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: #050b14;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .status-bar {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,180,255,0.08); border: 1px solid rgba(0,180,255,0.25);
      border-radius: 20px; padding: 4px 14px; margin-bottom: 2rem;
      font-family: 'Space Mono', monospace; font-size: 11px; color: #00b4ff;
      letter-spacing: 0.05em; position: relative; z-index: 2;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #00b4ff; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 2.5rem 2rem;
      max-width: 420px; width: 100%; text-align: center;
      position: relative; z-index: 2;
    }
    .shield-icon {
      width: 64px; height: 64px; background: rgba(0,180,255,0.08);
      border: 1px solid rgba(0,180,255,0.25); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 28px;
    }
    h1 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 2rem; line-height: 1.6; font-family: 'Space Mono', monospace; }
    .badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
    .badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 4px 12px;
      font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'Space Mono', monospace;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #00b4ff; }
    .turnstile-wrapper { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #00b4ff, #0077cc);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em; margin-bottom: 1.25rem;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.9; }
    .btn:not(:disabled):active { transform: scale(0.98); }
    .error-msg {
      background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.2);
      border-radius: 8px; padding: 10px 14px; font-size: 12px;
      font-family: 'Space Mono', monospace; color: #ff6060;
      margin-bottom: 1rem; display: none;
    }
    .security-note { font-size: 11px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.25); }
    .success-view { display: none; flex-direction: column; align-items: center; gap: 0.75rem; }
    .success-icon {
      width: 64px; height: 64px; background: rgba(0,180,255,0.12);
      border: 2px solid #00b4ff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; animation: pop 0.3s ease;
    }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1} }
    .success-title { font-size: 20px; font-weight: 800; color: #fff; }
    .success-sub { font-size: 12px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.4); }
    .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: #00b4ff; width: 0%; border-radius: 2px; transition: width 3s linear; }
    .footer { margin-top: 1.5rem; font-size: 11px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.2); z-index: 2; position: relative; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="status-bar"><div class="dot"></div>VERIFICATION REQUIRED</div>
  <div class="card">
    <div id="defaultView">
      <div class="shield-icon">🛡️</div>
      <h1>One quick check...</h1>
      <p class="subtitle">Verify you're human to access this link.</p>
      <div class="badges">
        <div class="badge"><div class="badge-dot"></div>Encrypted</div>
        <div class="badge"><div class="badge-dot"></div>Bot Prevention</div>
        <div class="badge"><div class="badge-dot"></div>Fast Redirect</div>
      </div>
      <div id="errorMsg" class="error-msg">Verification failed. Please try again.</div>
      <div class="turnstile-wrapper">
        <div class="cf-turnstile"
          data-sitekey="0x4AAAAAADH1B2TXIqfqar1f"
          data-callback="onVerified"
          data-expired-callback="onExpired"
          data-theme="dark">
        </div>
      </div>
      <button class="btn" id="continueBtn" disabled onclick="handleContinue()">Continue to Link →</button>
      <div class="security-note">🔒 Protected · Bot prevention active</div>
    </div>
    <div class="success-view" id="successView">
      <div class="success-icon">✓</div>
      <div class="success-title">Verified!</div>
      <div class="success-sub">Redirecting you now...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
  <div class="footer">ShieldLink · Anti-Bot Protection</div>
  <script>
    const pathParts = window.location.pathname.split('/');
    const token = pathParts[pathParts.length - 1];
    let cfToken = null;
    function onVerified(t) { cfToken = t; document.getElementById('continueBtn').disabled = false; }
    function onExpired() { cfToken = null; document.getElementById('continueBtn').disabled = true; }
    async function handleContinue() {
      if (!cfToken) return;
      const btn = document.getElementById('continueBtn');
      btn.disabled = true; btn.textContent = 'Verifying...';
      document.getElementById('errorMsg').style.display = 'none';
      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, cfToken })
        });
        const data = await res.json();
        if (data.success && data.url) {
          document.getElementById('defaultView').style.display = 'none';
          document.getElementById('successView').style.display = 'flex';
          setTimeout(() => { document.getElementById('progressFill').style.width = '100%'; }, 100);
          setTimeout(() => { window.location.href = data.url; }, 3200);
        } else {
          document.getElementById('errorMsg').style.display = 'block';
          btn.disabled = false; btn.textContent = 'Continue to Link →';
          if (window.turnstile) window.turnstile.reset();
        }
      } catch {
        document.getElementById('errorMsg').style.display = 'block';
        btn.disabled = false; btn.textContent = 'Continue to Link →';
        if (window.turnstile) window.turnstile.reset();
      }
    }
  </script>
</body>
</html>
